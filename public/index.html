<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowly | Ton flux d'actu</title>
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="minimal-header">
    <div class="top-lang-container">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="fr">FR</button>
            <span class="lang-separator">|</span>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>

    <div class="brand-wrap">
        <h1>Flowly</h1>
        <p>L'information décryptée en temps réel</p>
    </div>

    <div class="info-bar">
        <div id="current-date" class="date-left"></div>
        <button id="dark-mode-toggle" class="theme-right" type="button">THÈME</button>
    </div>
</header>

<nav class="compact-nav">
    <button type="button" class="nav-cat active" data-cat="general">ACTUALITÉS</button>
    <button type="button" class="nav-cat" data-cat="politics">POLITIQUE</button>
    <button type="button" class="nav-cat" data-cat="economy">ÉCONOMIE</button>
    <button type="button" class="nav-cat" data-cat="sports">SPORTS</button>
    <button type="button" class="nav-cat" data-cat="culture">CULTURE</button>
    <button type="button" class="nav-cat" data-cat="technology">TECH</button>
    <button id="btn-show-fav" type="button">⭐ FAVORIS</button>
</nav>

<main class="page-wrap">
    <section class="search-bar">
        <select id="source-select">
            <option value="">Toutes les sources</option>
        </select>
        <input type="text" id="keyword-input" placeholder="Rechercher...">
        <button id="filter-button" type="button">OK</button>
    </section>

    <div id="loading-indicator" class="hidden">Chargement...</div>
    <div id="no-results" class="hidden">Aucun résultat.</div>
    <section id="articles-container" class="articles-grid"></section>
</main>

<script src="js/ui.js"></script>
<script src="js/fetchNews.js"></script>
<script src="script.js"></script>
</body>
</html>
