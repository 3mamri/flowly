<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowly - Premium News</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="body">

<div class="top-bar">
    <div class="lang-switcher">
        <span class="lang-btn active" data-lang="fr" onclick="setLanguage('fr')">FRANÇAIS</span> |
        <span class="lang-btn" data-lang="en" onclick="setLanguage('en')">ENGLISH</span>
    </div>
</div>

<header class="minimal-header">
    <div class="h-left" id="current-date"></div>
    <div class="h-center">
        <h1>Flowly</h1>
        <p>L'information décryptée en temps réel</p>
    </div>
    <div class="h-right">
        <button id="dark-mode-toggle">THÈME</button>
    </div>
</header>

<nav class="compact-nav">
        <span onclick="filterCategory('Actualités')">ACTUALITÉS</span>
        <span onclick="filterCategory('Politique')">POLITIQUE</span>
        <span onclick="filterCategory('Économie')">ÉCONOMIE</span>
        <span onclick="filterCategory('Sports')">SPORTS</span>
        <span onclick="filterCategory('Culture')">CULTURE</span>
</nav>

<main>
    <section class="search-bar">
        <select id="language-select" style="display:none;">
            <option value="fr">fr</option>
            <option value="en">en</option>
        </select>

        <select id="source-select">
            <option value="">Toutes les sources</option>
        </select>

        <input type="text" id="keyword-input" placeholder="Rechercher...">
        <button id="filter-button">OK</button>
        <button id="clear-button" style="display:none;">X</button>
    </section>

    <div id="loading-indicator" class="hidden">Chargement...</div>
    <div id="articles-container"></div>
</main>

<script src="js/fetchNews.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        document.body.classList.add('ready');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('fr-FR', options).toUpperCase();
    });
    document.getElementById('dark-mode-toggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
</script>
</body>
</html>
